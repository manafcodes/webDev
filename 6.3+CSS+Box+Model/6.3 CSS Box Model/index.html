<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Box Model</title>
    <style>
      /* Box Model Example Styles */

      div {
        width: 200px;
        height: 200px;
        margin: 0;
      }

      #cadetblue {
        background-color: cadetblue;
        padding: 20px;
        border: 10px solid black;
      }

      #gold {
        background-color: gold;
        border: solid black;
        border-width: 20px 10px;
        margin-left: 260px;
      }

      #indianred {
        background-color: indianred;
        border: 10px solid black;
        margin-left: 40px;
      }
      p {
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!-- 3 colored boxes using the div element. -->
    <div id="cadetblue">
      <!-- Paragraph inside the first box -->
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam at sapien porttitor urna elementum lacinia. In
        id magna pulvinar, ultricies lorem id, vehicula elit. Aliquam eu luctus nisl, vitae pellentesque magna.
        Phasellus dolor metus, laoreet ac convallis sit amet, efficitur sed dolor.
      </p>
    </div>
    <div id="gold"></div>
    <div id="indianred"></div>
  </body>
</html>
